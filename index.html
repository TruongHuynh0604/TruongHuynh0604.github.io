<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMO VIETNAM CO.LTD</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.9/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Data Analysis - AI Project</h1>

        <!-- Ô nhập mã Model -->
        <input type="text" id="modelCode" placeholder="Nhập mã Model ở đây" style="width:100%; padding:10px; margin-bottom:15px; font-size:16px;"/>

        <!-- Ô nhập tên dự án -->
        <input type="text" id="projectName" placeholder="Nhập tên dự án ở đây" style="width:100%; padding:10px; margin-bottom:15px; font-size:16px;"/>

        <textarea id="inputData" placeholder="Nhập dữ liệu ở đây (ví dụ: label1:10,label2:20)"></textarea>
        <button id="processBtn">Process</button>
        <button id="saveBtn">Save Excel</button>
        <button id="printBtn">Print</button>
        
        <table id="dataTable">
            <thead>
                <tr>
                    <th>English Labels</th>
                    <th>Quantity (PCS)</th>
                    <th>Vietnamese Labels</th>
                    <th>Note</th>
                    <th>Remaining Quantity (PCS)</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dữ liệu sẽ được thêm vào đây -->
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
